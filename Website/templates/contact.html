{% extends "base.html" %}

{% block content %}

<section class="contact-section">

    <h1>Contact Us</h1>

    <form action="/send-contact"
          method="POST">

        <input type="text"
               name="name"
               placeholder="Your Name"
               required>

        <input type="email"
               name="email"
               placeholder="Email Address"
               required>

        <input type="tel"
               name="phone"
               placeholder="Mobile Number"
               required>

        <input type="text"
               name="message"
               placeholder="Tell us about your project shortly"
               required>

        <button type="submit">

            Start Your Project

        </button>

    </form>

</section>

{% endblock %}
